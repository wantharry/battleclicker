<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>✨ Clicker Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ── Animated gradient background ─────────────────────────── */
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-size: 400% 400%;
      animation: bgShift 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vw, 36px);
      min-height: 100dvh;
      padding: 16px;
      user-select: none;
      -webkit-user-select: none;
    }
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Particle canvas ───────────────────────────────────────── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Shared glass surface ──────────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 24px 64px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.05) inset;
    }

    /* ════════════════════════════════════════════════════════════
       SHOP PANEL
    ═══════════════════════════════════════════════════════════ */
    .shop {
      width: clamp(230px, 23vw, 300px);
      height: min(92dvh, 700px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .shop-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .shop-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .shop-balance {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f472b6);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 10px rgba(251,191,36,0.4));
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .shop-balance.bump { transform: scale(1.12); }

    /* Scroll buttons */
    .shop-scroll-btn {
      flex-shrink: 0;
      width: 100%;
      height: 38px;
      border: none;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.06em;
      font-weight: 700;
      transition: background 0.18s, color 0.18s, opacity 0.18s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .shop-scroll-btn:hover:not(:disabled) {
      background: rgba(167,139,250,0.14);
      color: #a78bfa;
    }
    .shop-scroll-btn:active:not(:disabled) {
      background: rgba(167,139,250,0.24);
    }
    .shop-scroll-btn:disabled {
      opacity: 0.18;
      cursor: default;
    }
    #scrollUp  { border-bottom: 1px solid rgba(255,255,255,0.07); }
    #scrollDown { border-top:   1px solid rgba(255,255,255,0.07); }

    /* Upgrade list viewport */
    .shop-viewport {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }
    /* Soft fade edges hint that more items exist */
    .shop-viewport::before,
    .shop-viewport::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 28px;
      pointer-events: none;
      z-index: 2;
      transition: opacity 0.25s;
    }
    .shop-viewport::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(17,15,40,0.7), transparent);
    }
    .shop-viewport::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(17,15,40,0.7), transparent);
    }
    .shop-viewport.at-top::before    { opacity: 0; }
    .shop-viewport.at-bottom::after  { opacity: 0; }

    /* Upgrade list */
    .shop-list {
      height: 100%;
      overflow-y: scroll;
      scrollbar-width: none;
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .shop-list::-webkit-scrollbar { display: none; }

    /* Single upgrade card */
    .upgrade {
      position: relative;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      transition:
        background 0.2s,
        border-color 0.2s,
        transform 0.15s cubic-bezier(0.34,1.56,0.64,1),
        box-shadow 0.2s,
        opacity 0.25s;
      -webkit-tap-highlight-color: transparent;
    }

    /* Can afford */
    .upgrade.affordable {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.3);
      box-shadow: 0 0 16px rgba(167,139,250,0.12);
    }
    .upgrade.affordable:hover {
      background: rgba(167,139,250,0.18);
      border-color: rgba(167,139,250,0.5);
      box-shadow: 0 0 24px rgba(167,139,250,0.22);
      transform: translateY(-2px) scale(1.01);
    }
    .upgrade.affordable:active {
      transform: scale(0.95);
    }

    /* Cannot afford */
    .upgrade.locked {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Fully upgraded */
    .upgrade.maxed {
      background: rgba(52, 211, 153, 0.08);
      border-color: rgba(52, 211, 153, 0.3);
      cursor: default;
      opacity: 0.75;
    }
    .upgrade.maxed .upgrade-cost { color: #34d399; }
    .upgrade.maxed .upgrade-desc { color: #34d399; opacity: 0.8; }

    /* Purchase flash */
    .upgrade.bought-flash {
      animation: buyFlash 0.35s ease-out;
    }
    @keyframes buyFlash {
      0%   { background: rgba(167,139,250,0.45); border-color: rgba(167,139,250,0.9); }
      100% { }
    }

    /* Ripple inside upgrade card */
    .upgrade .up-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(167,139,250,0.35);
      transform: scale(0);
      animation: upRippleAnim 0.45s ease-out forwards;
      pointer-events: none;
    }
    @keyframes upRippleAnim { to { transform: scale(6); opacity: 0; } }

    .upgrade-icon {
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(167,139,250,0.5));
    }

    .upgrade-info {
      flex: 1;
      min-width: 0;
    }
    .upgrade-name {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .upgrade-desc {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.38);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    .upgrade-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }
    .upgrade-cost {
      font-size: 13px;
      font-weight: 800;
      color: #fbbf24;
    }
    .upgrade-owned {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 1px 6px;
    }

    /* ════════════════════════════════════════════════════════════
       GAME CARD
    ═══════════════════════════════════════════════════════════ */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 4vw, 40px);
      padding: clamp(28px, 5vw, 56px) clamp(32px, 6vw, 80px);
    }

    .title {
      font-size: clamp(13px, 1.8vw, 17px);
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* ── Counter ─── */
    .counter-wrap { text-align: center; line-height: 1; }
    .counter {
      font-size: clamp(64px, 12vw, 130px);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 24px rgba(167,139,250,0.5));
      transition: transform 0.1s cubic-bezier(0.34,1.56,0.64,1);
      display: inline-block;
    }
    .counter.bump { transform: scale(1.08); }
    .counter-label {
      font-size: clamp(10px, 1.3vw, 13px);
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-top: 6px;
    }
    /* Sub-stats under counter */
    .counter-sub {
      margin-top: 8px;
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .counter-sub span { color: #a78bfa; }

    /* ── Button ─── */
    .btn-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-wrap::before {
      content: '';
      position: absolute;
      width: 200%; height: 200%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.18) 0%, transparent 70%);
      animation: glowPulse 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%,100% { transform: scale(0.85); opacity: 0.7; }
      50%      { transform: scale(1.05); opacity: 1; }
    }
    .btn {
      position: relative;
      width: clamp(110px, 18vw, 168px);
      height: clamp(110px, 18vw, 168px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: none;
      overflow: hidden;
      background: conic-gradient(from 180deg at 50% 50%,
        #a78bfa 0deg, #60a5fa 120deg, #34d399 240deg, #a78bfa 360deg);
      animation: btnSpin 6s linear infinite;
      box-shadow:
        0 0 0 6px rgba(167,139,250,0.18),
        0 0 40px rgba(167,139,250,0.4),
        0 12px 40px rgba(0,0,0,0.5);
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes btnSpin {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(360deg); }
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.06) 60%, transparent 100%);
      pointer-events: none;
    }
    .btn-icon {
      position: relative;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1;
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
      transition: transform 0.1s ease;
    }
    .btn:active, .btn.pressed {
      transform: scale(0.88);
      box-shadow:
        0 0 0 3px rgba(167,139,250,0.12),
        0 0 20px rgba(167,139,250,0.3),
        0 4px 16px rgba(0,0,0,0.4);
    }
    .btn.pressed .btn-icon { transform: scale(0.92); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: rippleAnim 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(3.5); opacity: 0; } }

    /* ── Stats bar ─── */
    .stats {
      display: flex;
      gap: clamp(16px, 3vw, 36px);
      align-items: center;
    }
    .stat { text-align: center; }
    .stat-value {
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 700;
      color: #a78bfa;
    }
    .stat-label {
      font-size: clamp(9px, 1vw, 11px);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-top: 4px;
    }
    .divider { width: 1px; height: 32px; background: rgba(255,255,255,0.1); }

    /* ── Streak ─── */
    .streak {
      font-size: clamp(11px, 1.4vw, 13px);
      font-weight: 600;
      color: #fbbf24;
      letter-spacing: 0.1em;
      height: 16px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .streak.visible { opacity: 1; transform: translateY(0); }

    /* ── Flash ─── */
    #flash {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 5;
      background: radial-gradient(ellipse at center, rgba(167,139,250,0.12) 0%, transparent 70%);
      opacity: 0;
    }
    #flash.pop { animation: flashAnim 0.25s ease-out forwards; }
    @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* ── Floating labels ─── */
    .float-label {
      position: fixed;
      pointer-events: none;
      z-index: 20;
      font-size: clamp(16px, 2.5vw, 24px);
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(167,139,250,0.8));
      animation: floatUp 0.95s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      transform-origin: center bottom;
      white-space: nowrap;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0)    scale(1.4); opacity: 1; }
      30%  { transform: translateY(-28px) scale(1.0); opacity: 1; }
      100% { transform: translateY(-90px) scale(0.7); opacity: 0; }
    }

    /* ── Purchase toast ─── */
    .purchase-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(167,139,250,0.18);
      border: 1px solid rgba(167,139,250,0.4);
      border-radius: 40px;
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 700;
      color: #c4b5fd;
      backdrop-filter: blur(16px);
      pointer-events: none;
      z-index: 30;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    .purchase-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Mobile layout ─── */
    @media (max-width: 700px) {
      body {
        flex-direction: column-reverse;
        overflow-y: auto;
        overflow-x: hidden;
        justify-content: flex-end;
        align-items: stretch;
        padding: 12px 12px 20px;
        gap: 12px;
      }
      .shop {
        width: 100%;
        max-height: none;
        height: auto;
      }
      .shop-scroll-btn { display: none; }
      .shop-viewport { overflow: visible; }
      .shop-viewport::before, .shop-viewport::after { display: none; }
      .shop-list {
        height: auto;
        overflow-y: visible;
        overflow-x: visible;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .upgrade { width: calc(50% - 5px); flex-direction: column; align-items: flex-start; }
      .card { padding: 28px 20px; }
    }

    .shop-section-divider {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 2px; flex-shrink: 0; margin-top: 6px;
    }
    .shop-section-divider::before, .shop-section-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }
    .shop-section-divider span {
      font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); white-space: nowrap;
    }
    .upgrade.char-equipped {
      background: rgba(251,191,36,0.08);
      border-color: rgba(251,191,36,0.45);
      box-shadow: 0 0 16px rgba(251,191,36,0.1);
      cursor: default;
    }
    .upgrade.char-equipped .upgrade-owned { color: #fbbf24; font-weight: 800; }
    #arena-container {
      position: fixed; bottom: 20px; right: 20px;
      width: 220px; display: flex; flex-direction: column;
      z-index: 15;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
      user-select: none; -webkit-user-select: none;
    }
    #arena-header {
      padding: 8px 12px 7px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 8px;
    }
    #arena-wave {
      font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.45); letter-spacing: 0.08em; flex-shrink: 0;
    }
    #arena-hp-wrap {
      flex: 1; height: 6px; background: rgba(255,255,255,0.1);
      border-radius: 3px; overflow: hidden;
    }
    #arena-hp-fill {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #34d399, #60a5fa);
      border-radius: 3px; transition: width 0.15s ease, background 0.3s;
    }
    #arena-hp-text {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.35); flex-shrink: 0;
    }
    #arena-canvas { display: block; }
    #arena-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: rgba(8,6,24,0.8);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #arena-overlay.hidden { display: none; }
    #arena-overlay-title {
      font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,0.65); text-align: center;
    }
    #arena-char-preview { font-size: 42px; line-height: 1; }
    #arena-start {
      padding: 9px 28px; border-radius: 30px; border: none;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: white; font-size: 14px; font-weight: 800; cursor: pointer;
      box-shadow: 0 4px 20px rgba(167,139,250,0.4);
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    #arena-start:hover  { transform: scale(1.06); box-shadow: 0 6px 28px rgba(167,139,250,0.6); }
    #arena-start:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div id="flash"></div>
<canvas id="canvas"></canvas>
<div class="purchase-toast" id="toast"></div>

<!-- ══ SHOP ══════════════════════════════════════════════════════ -->
<aside class="shop glass" id="shop">
  <div class="shop-header">
    <div class="shop-title">🛒 Shop</div>
    <div class="shop-balance" id="shopBalance">0</div>
  </div>
  <button class="shop-scroll-btn" id="scrollUp" disabled>▲ scroll up</button>
  <div class="shop-viewport at-top" id="shopViewport">
    <div class="shop-list" id="shopList">
      <!-- Populated by JS -->
    </div>
  </div>
  <button class="shop-scroll-btn" id="scrollDown">▼ scroll down</button>
</aside>

<!-- ══ GAME CARD ═════════════════════════════════════════════════ -->
<main class="card glass">
  <p class="title">✨ Clicker</p>

  <div class="counter-wrap">
    <div class="counter" id="counter">0</div>
    <div class="counter-label">Total Clicks</div>
    <div class="counter-sub" id="counterSub">
      <span id="subClick">+1</span>/click &nbsp;·&nbsp;
      <span id="subAuto">0</span>/sec
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="btn" aria-label="Click me">
      <span class="btn-icon">⚡</span>
    </button>
  </div>

  <div class="streak" id="streak">🔥 Streak!</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="cps">0</div>
      <div class="stat-label">Per Second</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-value" id="best">0</div>
      <div class="stat-label">Best / Sec</div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-value" id="session">0:00</div>
      <div class="stat-label">Session</div>
    </div>
  </div>
</main>

<script>
/* ─────────────────────────────────────────────────────────────────
   Game State
───────────────────────────────────────────────────────────────── */
let count        = 0;       // true click total
let displayCount = 0;       // for smooth animated counter
let clickPower   = 1;       // clicks granted per manual click
let autoPerSec   = 0;       // clicks granted per second (passive)
let autoAccum    = 0;       // fractional accumulator for auto clicks
let clicksInWindow = [];
let bestCPS      = 0;
let streakTimer  = null;
let startTime    = Date.now();

/* ─────────────────────────────────────────────────────────────────
   Upgrades Definition
───────────────────────────────────────────────────────────────── */
const UPGRADES = [
  // ── Tier 1: Early game ──────────────────────────────────────────

// owned counts per upgrade
const owned = {};
const MAX_OWNED = 4;
UPGRADES.forEach(u => owned[u.id] = 0);

function upgradeCost(upgrade) {
  if (owned[upgrade.id] >= MAX_OWNED) return Infinity;
  return Math.floor(upgrade.baseCost * Math.pow(1.15, owned[upgrade.id]));
}

function recomputePower() {
  clickPower = 1;
  autoPerSec = 0;
  UPGRADES.forEach(u => {
    const n = owned[u.id];
    if (n > 0) {
      // Each successive purchase doubles the previous tier: total = base*(2^n - 1)
      clickPower += u.clickBonus * (Math.pow(2, n) - 1);
      autoPerSec += u.autoBonus  * (Math.pow(2, n) - 1);
    }
  });
  document.getElementById('subClick').textContent = '+' + fmtNum(clickPower);
  document.getElementById('subAuto').textContent  = fmtNum(autoPerSec);
}

function fmtNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function buildShop() {
  shopList.innerHTML = '';
  UPGRADES.forEach(u => {

    card.id = 'upg-' + u.id;
    card.innerHTML = `

function refreshShopAffordability() {
  UPGRADES.forEach(u => {
    const card = document.getElementById('upg-' + u.id);
    const cost = upgradeCost(u);
    const n    = owned[u.id];

    document.getElementById('cost-' + u.id).textContent = fmtNum(cost);
    document.getElementById('owned-' + u.id).textContent = 'x' + n;

    // Show what the NEXT purchase will contribute (doubles each time)
    const nextTier = Math.pow(2, n); // 1, 2, 4, 8, ...
    const descEl   = document.getElementById('desc-' + u.id);
    if (n >= MAX_OWNED) {
      descEl.textContent = '★ Fully upgraded ★';
      card.classList.remove('affordable', 'locked');
      card.classList.add('maxed');
      return;
    }
    card.classList.remove('maxed');
    if (n === 0) {
      descEl.textContent = u.desc;
    } else if (u.clickBonus > 0) {
      descEl.textContent = `Next: +${fmtNum(u.clickBonus * nextTier)}/click (2×)`;
    } else {
      descEl.textContent = `Next: +${fmtNum(u.autoBonus * nextTier)}/sec (2×)`;
    }

    if (count >= cost) {
      card.classList.add('affordable');
      card.classList.remove('locked');
    } else {
      card.classList.remove('affordable');
      card.classList.add('locked');
    }
  });
  refreshCharacterSection();
}

const toastEl = document.getElementById('toast');
let toastTimeout;

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

function buyUpgrade(upgrade, e) {
  if (e) e.preventDefault();
  if (owned[upgrade.id] >= MAX_OWNED) return;
  const cost = upgradeCost(upgrade);
  if (count < cost) return;

  count -= cost;
  owned[upgrade.id]++;
  recomputePower();
  refreshShopAffordability();

  // Ripple inside card
  const card = document.getElementById('upg-' + upgrade.id);
  card.classList.remove('bought-flash');
  void card.offsetWidth;
  card.classList.add('bought-flash');
  spawnUpgradeRipple(card, e);

  // Balance bump
  const balEl = document.getElementById('shopBalance');
  balEl.classList.remove('bump');
  void balEl.offsetWidth;
  balEl.classList.add('bump');
  balEl.addEventListener('animationend', () => balEl.classList.remove('bump'), { once: true });

  playBuy();
  showToast(`${upgrade.icon} ${upgrade.name} purchased!`);
}

function spawnUpgradeRipple(card, e) {
  const rect = card.getBoundingClientRect();
  const cx = ((e && (e.clientX ?? e.touches?.[0]?.clientX)) ?? rect.left + rect.width/2) - rect.left;
  const cy = ((e && (e.clientY ?? e.touches?.[0]?.clientY)) ?? rect.top + rect.height/2) - rect.top;
  const r = document.createElement('div');
  r.className = 'up-ripple';
  r.style.cssText = `width:40px;height:40px;left:${cx-20}px;top:${cy-20}px;`;
  card.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

   Audio
───────────────────────────────────────────────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    o.frequency.setValueAtTime(520, t);
    o.frequency.exponentialRampToValueAtTime(220, t + 0.08);
    o.type = 'sine';
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.13);
  } catch(e) {}
}

function playBuy() {
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    // Pleasant ascending arpeggio
    [[440,0],[554,0.06],[659,0.12],[880,0.18]].forEach(([freq, delay]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      const t = audioCtx.currentTime + delay;
      o.frequency.setValueAtTime(freq, t);
      o.type = 'sine';
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.start(t); o.stop(t + 0.22);
    });
  } catch(e) {}
}

function playAutoTick() {
  try {
    if (audioCtx.state === 'suspended') return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    o.frequency.setValueAtTime(320, t);
    o.frequency.exponentialRampToValueAtTime(180, t + 0.04);
    o.type = 'sine';
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.start(t); o.stop(t + 0.07);
  } catch(e) {}
}

/* ─────────────────────────────────────────────────────────────────
   Canvas particles
───────────────────────────────────────────────────────────────── */
const canvas = document.getElementById('canvas');
const ctx2   = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const COLORS = ['#a78bfa','#60a5fa','#34d399','#f472b6','#fbbf24','#fb7185','#38bdf8'];

function spawnParticles(x, y, n = 18) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.8;
    const speed = 2.5 + Math.random() * 4.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      size: 3 + Math.random() * 5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      life: 0.6 + Math.random() * 0.5,
      maxLife: 0,
      gravity: 0.12 + Math.random() * 0.06
    });
    particles[particles.length-1].maxLife = particles[particles.length-1].life;
  }
}

function drawParticles(dt) {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.life -= dt; p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity; p.vx *= 0.97;
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx2.save();
    ctx2.globalAlpha = alpha;
    ctx2.fillStyle = p.color;
    ctx2.shadowColor = p.color;
    ctx2.shadowBlur = 8;
    ctx2.beginPath();
    ctx2.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx2.fill();
    ctx2.restore();
  }
}

/* ─────────────────────────────────────────────────────────────────
   Animation loop
───────────────────────────────────────────────────────────────── */
let lastTime = performance.now();
let autoTickAccum = 0; // for auto-tick sound throttle

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // ── Auto clicker ──
  if (autoPerSec > 0) {
    autoAccum += autoPerSec * dt;
    if (autoAccum >= 1) {
      const gained = Math.floor(autoAccum);
      autoAccum -= gained;
      count += gained;

      // Soft auto-tick sound (throttled to max once per 0.3s)
      autoTickAccum += dt;
      if (autoTickAccum >= 0.3) {
        autoTickAccum = 0;
        playAutoTick();
      }
    }
  }

  // ── Smooth counter ──
  if (displayCount !== count) {
    const diff = count - displayCount;
    displayCount += diff * Math.min(dt * 14, 1);
    if (Math.abs(count - displayCount) < 0.5) displayCount = count;
    document.getElementById('counter').textContent = Math.floor(displayCount).toLocaleString();
    document.getElementById('shopBalance').textContent = Math.floor(displayCount).toLocaleString();
  }

  // ── Shop affordability (re-check periodically) ──
  refreshShopAffordability();

  // ── CPS ──
  const now2 = Date.now();
  clicksInWindow = clicksInWindow.filter(t => now2 - t < 1000);
  const cps = clicksInWindow.length;
  document.getElementById('cps').textContent = cps;
  if (cps > bestCPS) {
    bestCPS = cps;
    document.getElementById('best').textContent = bestCPS;
  }

  // ── Session timer ──
  const elapsed = Math.floor((now2 - startTime) / 1000);
  const mm = Math.floor(elapsed / 60);
  const ss = String(elapsed % 60).padStart(2, '0');
  document.getElementById('session').textContent = `${mm}:${ss}`;

  drawParticles(dt);
  arenaUpdate(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

───────────────────────────────────────────────────────────────── */
function spawnRipple(btn, e) {
  const rect = btn.getBoundingClientRect();
  const cx = (e.clientX ?? rect.left + rect.width/2) - rect.left;
  const cy = (e.clientY ?? rect.top  + rect.height/2) - rect.top;
  const size = Math.max(rect.width, rect.height) * 0.9;
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px;`;
  btn.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

/* ─────────────────────────────────────────────────────────────────
   Main click handler
───────────────────────────────────────────────────────────────── */
const btn = document.getElementById('btn');

function handleClick(e) {
  e.preventDefault();
  const clientX = e.clientX ?? (e.touches && e.touches[0]?.clientX) ?? window.innerWidth / 2;
  const clientY = e.clientY ?? (e.touches && e.touches[0]?.clientY) ?? window.innerHeight / 2;

  count += clickPower;
  clicksInWindow.push(Date.now());

  playClick();
  bumpCounter();
  triggerFlash();
  spawnRipple(btn, { clientX, clientY });
  spawnParticles(clientX, clientY, 18 + Math.min(clickPower, 40));
  spawnFloatingLabel(clientX, clientY - 30, clickPower);

  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 130);

  showStreak(clicksInWindow.filter(t => Date.now() - t < 1000).length);
}

btn.addEventListener('click',      handleClick);
btn.addEventListener('touchstart', handleClick, { passive: false });
btn.addEventListener('touchend', e => e.preventDefault());

document.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && !e.repeat) {
    handleClick({ clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 });
  }
});

function buildCharacterSection() {
  const divider = document.createElement('div');
  divider.className = 'shop-section-divider';
  divider.innerHTML = '<span>Characters</span>';
  shopList.appendChild(divider);
  CHARACTERS.forEach(ch => {

function refreshCharacterSection() {
  CHARACTERS.forEach(ch => {
    const card = document.getElementById('char-' + ch.id);
    if (!card) return;
    const isOwned    = charOwned.has(ch.id);
    const isEquipped = ch.id === activeCharId;
    const statusEl   = document.getElementById('chs-' + ch.id);
    card.classList.remove('affordable', 'locked', 'maxed', 'char-equipped');
    if (isEquipped) {
      card.classList.add('char-equipped');
      statusEl.textContent = '✓ Active';
    } else if (isOwned) {
      card.classList.add('affordable');
      statusEl.textContent = 'Equip';
    } else if (count >= ch.cost) {
      card.classList.add('affordable');
      statusEl.textContent = 'Unlock';
    } else {
      card.classList.add('locked');
      statusEl.textContent = 'Unlock';
    }
  });
}

function onCharClick(ch, e) {
  if (e) e.preventDefault();
  if (charOwned.has(ch.id)) {
    if (ch.id === activeCharId) return;
    equipCharacter(ch.id);
    spawnUpgradeRipple(document.getElementById('char-' + ch.id), e);
    playBuy();
    showToast(ch.emoji + ' ' + ch.name + ' equipped!');
  } else if (count >= ch.cost) {
    count -= ch.cost;
    charOwned.add(ch.id);
    equipCharacter(ch.id);
    spawnUpgradeRipple(document.getElementById('char-' + ch.id), e);
    playBuy();
    showToast(ch.emoji + ' ' + ch.name + ' unlocked & equipped!');
  }
}

function equipCharacter(id) {
  activeCharId = id;
  const ch = CHARACTERS.find(c => c.id === id);
  if (arenaActive) {
    charMaxHP = ch.hp;
    charHP    = Math.min(charHP, charMaxHP);
  } else {
    charMaxHP = ch.hp;
    charHP    = ch.hp;
  }
  document.getElementById('arena-char-preview').textContent = ch.emoji;
  updateArenaHPBar();
  refreshCharacterSection();
  if (!arenaActive) drawArenaIdle();
}

const arenaStartBtn = document.getElementById('arena-start');
arenaStartBtn.addEventListener('click', startArena);

function startArena() {
  const ch  = CHARACTERS.find(c => c.id === activeCharId);
  charMaxHP = ch.hp; charHP = ch.hp;
  arenaWave = 0; arenaActive = true;
  arenaZombies = []; arenaDmgNums = [];
  charHitFlash = 0; charAtkTimer = 0.4;
  arenaOverlay.classList.add('hidden');
  updateArenaHPBar();
  arenaNextWave();
}

function arenaNextWave() {
  arenaWave++;
  zombiesLeft      = 3 + arenaWave * 2;
  zombieSpawnTimer = 0.5;
  wavePhase        = 'spawning';
  document.getElementById('arena-wave').textContent = 'Wave ' + arenaWave;
}

function arenaGameOver() {
  arenaActive = false; wavePhase = 'idle';
  const survived = Math.max(0, arenaWave - 1);
  arenaTitle.textContent = '💀 Wave ' + survived + ' survived';
  arenaStartBtn.textContent = '↺ Restart';
  arenaOverlay.classList.remove('hidden');
  drawArenaIdle();
  if (survived > 0) {
    const bonus = survived * 20;
    count += bonus;
    showToast('+' + fmtNum(bonus) + ' bonus clicks!');
  }
}

function spawnZombie() {
  const hp  = 20 + arenaWave * 15;
  arenaZombies.push({
    x: -22, y: 50 + Math.random() * 90,
    hp, maxHp: hp,
    speed:  26 + arenaWave * 3,
    damage:  3 + arenaWave * 2,
    dmgTimer: 1.0, hitFlash: 0,
  });
}

function arenaUpdate(dt) {
  if (!arenaActive) return;
  const ch = CHARACTERS.find(c => c.id === activeCharId);

  if (wavePhase === 'spawning') {
    zombieSpawnTimer -= dt;
    if (zombieSpawnTimer <= 0 && zombiesLeft > 0) {
      spawnZombie(); zombiesLeft--;
      zombieSpawnTimer = Math.max(0.4, 2.0 - arenaWave * 0.1);
    }
    if (zombiesLeft === 0) wavePhase = 'clearing';
  }
  if (wavePhase === 'clearing' && arenaZombies.length === 0) {
    wavePhase = 'break'; waveBreakTimer = 2.2;
  }
  if (wavePhase === 'break') {
    waveBreakTimer -= dt;
    if (waveBreakTimer <= 0) arenaNextWave();
  }

  charHitFlash = Math.max(0, charHitFlash - dt * 5);
  for (const z of arenaZombies) {
    z.hitFlash = Math.max(0, z.hitFlash - dt * 5);
    if (z.x < CHAR_X - ATTACK_RANGE) {
      z.x += z.speed * dt;
    } else {
      z.dmgTimer -= dt;
      if (z.dmgTimer <= 0) {
        z.dmgTimer = 1.1;
        charHP = Math.max(0, charHP - z.damage);
        charHitFlash = 1;
        arenaDmgNums.push({
          x: CHAR_X + (Math.random()-0.5)*18, y: CHAR_Y - 14,
          text: '-' + z.damage, color: '#fb7185', size: 12,
          vy: -42, life: 0.75, maxLife: 0.75,
        });
        updateArenaHPBar();
        if (charHP <= 0) { arenaGameOver(); return; }
      }
    }
  }

  charAtkTimer -= dt;
  if (charAtkTimer <= 0 && arenaZombies.length > 0) {
    charAtkTimer = ch.atkSpeed;
    const target = arenaZombies.reduce((a, b) => a.x > b.x ? a : b);
    target.hp -= ch.atk; target.hitFlash = 1;
    arenaDmgNums.push({
      x: target.x + (Math.random()-0.5)*14, y: target.y - 20,
      text: '-' + ch.atk, color: '#a78bfa', size: 13,
      vy: -50, life: 0.65, maxLife: 0.65,
    });
    arenaZombies = arenaZombies.filter(z => z.hp > 0);
  }

  for (const d of arenaDmgNums) { d.y += d.vy * dt; d.life -= dt; }
  arenaDmgNums = arenaDmgNums.filter(d => d.life > 0);
  drawArena();
}

function updateArenaHPBar() {
  const pct  = Math.max(0, charHP / charMaxHP) * 100;
  const fill = document.getElementById('arena-hp-fill');
  fill.style.width = pct + '%';
  fill.style.background =
    pct > 50 ? 'linear-gradient(90deg,#34d399,#60a5fa)' :
    pct > 25 ? 'linear-gradient(90deg,#fbbf24,#fb923c)' :
               'linear-gradient(90deg,#fb7185,#f43f5e)';
  document.getElementById('arena-hp-text').textContent =
    Math.ceil(charHP) + '/' + charMaxHP;
}

function drawArenaBase() {
  const W = 220, H = 180;
  actx.clearRect(0,0,W,H);
  actx.fillStyle = '#0d0a1e'; actx.fillRect(0,0,W,H);
  actx.strokeStyle = 'rgba(255,255,255,0.03)'; actx.lineWidth = 1;
  for (let x=0;x<W;x+=22){actx.beginPath();actx.moveTo(x,0);actx.lineTo(x,H);actx.stroke();}
  for (let y=0;y<H;y+=22){actx.beginPath();actx.moveTo(0,y);actx.lineTo(W,y);actx.stroke();}
  actx.strokeStyle='rgba(167,139,250,0.2)'; actx.lineWidth=1.5;
  actx.beginPath(); actx.moveTo(0,148); actx.lineTo(W,148); actx.stroke();
}

function drawArenaIdle() {
  drawArenaBase();
  const ch = CHARACTERS.find(c => c.id === activeCharId);
  actx.font = '46px serif';
  actx.textAlign = 'center'; actx.textBaseline = 'middle';
  actx.fillText(ch.emoji, 110, 90);
}

function drawArena() {
  const W = 220, H = 180;
  drawArenaBase();
  const ch = CHARACTERS.find(c => c.id === activeCharId);
  if (charHitFlash > 0) {
    actx.save(); actx.globalAlpha = charHitFlash * 0.35;
    actx.fillStyle = '#fb7185';
    actx.fillRect(CHAR_X-26, CHAR_Y-26, 52, 52); actx.restore();
  }
  actx.font = '34px serif';
  actx.textAlign = 'center'; actx.textBaseline = 'middle';
  actx.fillText(ch.emoji, CHAR_X, CHAR_Y);

  for (const z of arenaZombies) {
    if (z.hitFlash > 0) {
      actx.save(); actx.globalAlpha = z.hitFlash*0.45;
      actx.fillStyle='#a78bfa'; actx.fillRect(z.x-17,z.y-17,34,34); actx.restore();
    }
    actx.font = '26px serif';
    actx.fillText('🧟', z.x, z.y);
    const f = z.hp / z.maxHp;
    actx.fillStyle='rgba(0,0,0,0.55)'; actx.fillRect(z.x-17,z.y-27,34,4);
    actx.fillStyle = f>0.5?'#34d399':f>0.25?'#fbbf24':'#fb7185';
    actx.fillRect(z.x-17, z.y-27, 34*f, 4);
  }

  actx.textAlign = 'center';
  for (const d of arenaDmgNums) {
    actx.globalAlpha = Math.max(0, d.life/d.maxLife);
    actx.fillStyle = d.color;
    actx.font = 'bold ' + d.size + 'px sans-serif';
    actx.fillText(d.text, d.x, d.y);
  }
  actx.globalAlpha = 1;

  if (wavePhase === 'break') {
    actx.fillStyle = 'rgba(167,139,250,0.9)';
    actx.font = 'bold 13px sans-serif';
    actx.fillText('Wave Clear! ✨', W/2, H/2);
  }
}

buildShop();
refreshShopAffordability();
recomputePower();
updateArenaHPBar();
drawArenaIdle();
// Set initial scroll button states now that cards exist
requestAnimationFrame(updateScrollBtns);
</script>

<div id="arena-container">
  <div id="arena-header">
    <span id="arena-wave">Idle</span>
    <div id="arena-hp-wrap"><div id="arena-hp-fill"></div></div>
    <span id="arena-hp-text">—</span>
  </div>
  <canvas id="arena-canvas" width="220" height="180"></canvas>
  <div id="arena-overlay">
    <div id="arena-char-preview">🤺</div>
    <div id="arena-overlay-title">Defend your base!</div>
    <button id="arena-start">▶ Start</button>
  </div>
</div>
</body>
</html>
